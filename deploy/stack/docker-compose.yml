services:
  sandbox-image:
    profiles: ["build"]
    image: ${OPEN_REVIEW_SANDBOX_IMAGE:-open-review/sandbox:0.1.0}
    build:
      context: ../..
      dockerfile: deploy/sandbox/Dockerfile
    command:
      - bash
      - -lc
      - "true"

  phoenix:
    image: ${OPEN_REVIEW_PHOENIX_IMAGE:-arizephoenix/phoenix:14.2.1}
    restart: unless-stopped
    depends_on:
      - phoenix-db
    ports:
      - "${PHOENIX_PORT:-6006}:6006"
      - "${PHOENIX_OTLP_GRPC_PORT:-4317}:4317"
    environment:
      PHOENIX_SQL_DATABASE_URL: "postgresql://${POSTGRES_USER:-phoenix}:${POSTGRES_PASSWORD:-change-me}@phoenix-db:5432/${POSTGRES_DB:-phoenix}"
      PHOENIX_ENABLE_AUTH: "${PHOENIX_ENABLE_AUTH:-true}"
      PHOENIX_SECRET: "${PHOENIX_SECRET:-change-me-32chars-min1digit1lower}"
      PHOENIX_DEFAULT_ADMIN_INITIAL_PASSWORD: "${PHOENIX_DEFAULT_ADMIN_INITIAL_PASSWORD:-change-me-admin}"

  phoenix-db:
    image: ${OPEN_REVIEW_POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-phoenix}"
      POSTGRES_USER: "${POSTGRES_USER:-phoenix}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me}"
    volumes:
      - phoenix_postgres_data:/var/lib/postgresql/data

  web:
    image: ${OPEN_REVIEW_IMAGE:-open-review:0.1.0}
    build:
      context: ../..
      dockerfile: Dockerfile
    user: "${OPEN_REVIEW_UID:-1000}:${OPEN_REVIEW_GID:-1000}"
    restart: unless-stopped
    depends_on:
      - phoenix
    environment:
      - OPEN_REVIEW_RUNTIME_ROLE=web
      - OPEN_REVIEW_UID=${OPEN_REVIEW_UID:-1000}
      - OPEN_REVIEW_GID=${OPEN_REVIEW_GID:-1000}
      - PORT=8000
      - SANDBOX_TYPE=docker
      - DOCKER_IMAGE=${OPEN_REVIEW_SANDBOX_IMAGE:-open-review/sandbox:0.1.0}
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006/v1/traces
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,*.local,10.*,172.16.*,172.17.*,172.18.*,172.19.*,172.2*,172.30.*,172.31.*,192.168.*},gitlab,gitlab.local,gitlab_gitlab_1
      - no_proxy=${no_proxy:-localhost,127.0.0.1,*.local,10.*,172.16.*,172.17.*,172.18.*,172.19.*,172.2*,172.30.*,172.31.*,192.168.*},gitlab,gitlab.local,gitlab_gitlab_1
    ports:
      - "${OPEN_REVIEW_WEB_PORT:-8000}:8000"
    volumes:
      - /var/lib/open-review:/var/lib/open-review

  worker:
    image: ${OPEN_REVIEW_IMAGE:-open-review:0.1.0}
    build:
      context: ../..
      dockerfile: Dockerfile
    user: "${OPEN_REVIEW_UID:-1000}:${OPEN_REVIEW_GID:-1000}"
    group_add:
      - "${OPEN_REVIEW_DOCKER_GID:-0}"
    restart: unless-stopped
    depends_on:
      - web
      - phoenix
    environment:
      - OPEN_REVIEW_RUNTIME_ROLE=worker
      - OPEN_REVIEW_UID=${OPEN_REVIEW_UID:-1000}
      - OPEN_REVIEW_GID=${OPEN_REVIEW_GID:-1000}
      - SANDBOX_TYPE=docker
      - DOCKER_IMAGE=${OPEN_REVIEW_SANDBOX_IMAGE:-open-review/sandbox:0.1.0}
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006/v1/traces
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,*.local,10.*,172.16.*,172.17.*,172.18.*,172.19.*,172.2*,172.30.*,172.31.*,192.168.*},gitlab,gitlab.local,gitlab_gitlab_1
      - no_proxy=${no_proxy:-localhost,127.0.0.1,*.local,10.*,172.16.*,172.17.*,172.18.*,172.19.*,172.2*,172.30.*,172.31.*,192.168.*},gitlab,gitlab.local,gitlab_gitlab_1
    volumes:
      - /var/lib/open-review:/var/lib/open-review
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  phoenix_postgres_data:
